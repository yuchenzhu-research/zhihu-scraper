zhihu:
  cookies:
    file: .local/cookies.json
    pool_dir: .local/cookie_pool
    required: true
  browser:
    headless: true
    timeout: 30000
    viewport:
      width: 1920
      height: 1080
    channel: chrome
    args:
    - --disable-blink-features=AutomationControlled
    - --no-sandbox
    - --disable-infobars
  anti_detection:
    stealth: true
    webgl: true
    navigator: true
  signature:
    enabled: false
crawler:
  retry:
    max_attempts: 3
    base_delay: 1.0
    max_delay: 30.0
    exponential_base: 2.0
    jitter: true
  scroll:
    timeout: 60000
    pause: 1000
    viewport_height: 800
  humanize:
    enabled: true
    min_delay: 1.0
    max_delay: 3.0
    scroll_delay: 0.5
    page_load_delay: 2.0
  images:
    concurrency: 4
    timeout: 30.0
    referer: https://www.zhihu.com/
output:
  directory: data
  format: markdown
  images_subdir: images
  folder_format: '[{date}] {title}'
logging:
  level: INFO
  format: console
  file: .local/logs/scraper.log
  log_exceptions: true
global:
  language: zh
  language_configured: false
translation:
  enabled: false
  target_language: en
  engine: openai
  base_url: https://api.openai.com/v1
  api_key: ''
  model: gpt-4o-mini
  comment_top_n: 5
