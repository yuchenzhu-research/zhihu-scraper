name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e .

      - name: Compile Python modules
        run: python -m compileall cli core

      - name: CLI smoke check
        run: |
          python cli/app.py --help
          python cli/app.py manual --help
          python cli/app.py check --help
